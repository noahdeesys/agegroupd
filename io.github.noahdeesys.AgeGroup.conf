<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root or the 'agegroup' group can run the daemon -->
  <policy user="root">
    <allow own="io.github.noahdeesys.AgeGroup"/>
  </policy>
  <policy group="agegroup">
    <allow own="io.github.noahdeesys.AgeGroup"/>
  </policy>

  <!-- Any sandboxed browser or local user can call the methods -->
  <policy context="default">
    <allow send_destination="io.github.noahdeesys.AgeGroup"/>
    <allow receive_sender="io.github.noahdeesys.AgeGroup"/>
  </policy>
</busconfig>
